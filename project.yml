name: wm
options:
  bundleIdPrefix: com.void2610
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: minimal

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.2.1
  TOMLKit:
    url: https://github.com/LebJe/TOMLKit
    from: 0.6.0

targets:
  wm:
    type: application
    platform: macOS
    sources:
      - path: wm
        excludes:
          - "**/.DS_Store"
    resources:
      - path: wm/Config/DefaultConfig.toml
    info:
      path: wm/Info.plist
      properties:
        CFBundleName: $(PRODUCT_NAME)
        CFBundleDisplayName: wm
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        # Dock 非表示にするため LSUIElement=YES。menu bar item は AppDelegate で
        # NSStatusItem を直接生成しているので、MenuBarExtra/Settings を使わない構成では
        # LSUIElement=YES でも問題なくアイコンが出る。
        LSUIElement: true
        NSHumanReadableCopyright: ""
        NSAccessibilityUsageDescription: "ウィンドウを移動・リサイズするためにアクセシビリティ権限が必要です。"
        NSAppleEventsUsageDescription: "他アプリの操作を行うために必要です。"
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
    entitlements:
      path: wm/wm.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.automation.apple-events: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.void2610.wm
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - package: KeyboardShortcuts
      - package: TOMLKit
    postBuildScripts:
      - name: "Embed Git Commit Hash"
        # ビルド成果物の Info.plist に現在の git short hash を埋め込む。
        # ソース側の Info.plist は触らないので git diff に出ない。
        # basedOnDependencyAnalysis: false でないと incremental build で skip される
        basedOnDependencyAnalysis: false
        script: |
          set -e
          cd "$SRCROOT"
          GIT_HASH=$(/usr/bin/git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          PLIST="$BUILT_PRODUCTS_DIR/$INFOPLIST_PATH"
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Delete :GitCommitHash" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :GitCommitHash string $GIT_HASH" "$PLIST"
          fi

  wmTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - wmTests
    dependencies:
      - target: wm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.void2610.wmTests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/wm.app/Contents/MacOS/wm"

schemes:
  wm:
    build:
      targets:
        wm: all
        wmTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - wmTests
    archive:
      config: Release
