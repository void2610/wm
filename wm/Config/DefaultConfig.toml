# wm デフォルト設定ファイル
# このファイルは初回起動時に ~/.config/wm/config.toml にコピーされる。
# モディファイア表記: cmd, opt, ctrl, shift

[general]
animation_enabled = true
animation_duration = 0.25
padding = 8

[hotkeys]
# snap_left / snap_right は同じキーを連打すると
#   半分 → 上 1/4 → 下 1/4 → 半分 → ...
# と巡回する。snap_top は
#   上半分 → 全画面
# に巡回する
snap_left   = "cmd+ctrl+left"
snap_right  = "cmd+ctrl+right"
snap_top    = "cmd+ctrl+up"
snap_bottom = "cmd+ctrl+down"
maximize    = "cmd+ctrl+return"
center      = "cmd+ctrl+c"

# 方向フォーカス移動
# 指定方向にある最も近いウィンドウへフォーカスを移す（同一画面の隣ウィンドウ →
# 無ければ隣ディスプレイのウィンドウ、と位置関係でカスケードされる）
# focus_left  = "cmd+opt+left"
# focus_right = "cmd+opt+right"
# focus_up    = "cmd+opt+up"
# focus_down  = "cmd+opt+down"

# アプリ起動ホットキーの例
# bundle_id を指定すると LaunchServices 経由で .app を起動・activate する
# [[launch]]
# key = "cmd+shift+1"
# bundle_id = "com.apple.Safari"

# path を指定すると任意の実行ファイル / .app を直接起動できる (~/ も解釈される)
# [[launch]]
# key = "cmd+shift+2"
# path = "~/Documents/GitHub/melchior/build/melchior_main"
