name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate xcodeproj
        run: xcodegen generate --spec project.yml

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project MyWM.xcodeproj \
            -scheme MyWM \
            -configuration Debug \
            -destination "platform=macOS" \
            -derivedDataPath build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Test
        run: |
          set -o pipefail
          xcodebuild \
            -project MyWM.xcodeproj \
            -scheme MyWM \
            -configuration Debug \
            -destination "platform=macOS" \
            -derivedDataPath build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            test
