name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate xcodeproj
        run: xcodegen generate --spec project.yml

      - name: Build (Debug)
        run: |
          set -o pipefail
          xcodebuild \
            -project wm.xcodeproj \
            -scheme wm \
            -configuration Debug \
            -destination "platform=macOS" \
            -derivedDataPath build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Test
        run: |
          set -o pipefail
          xcodebuild \
            -project wm.xcodeproj \
            -scheme wm \
            -configuration Debug \
            -destination "platform=macOS" \
            -derivedDataPath build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            test

      - name: Build (Release)
        run: |
          set -o pipefail
          # CODE_SIGNING_ALLOWED=NO を付けると本当に未署名で出てしまい、
          # quarantine 付き起動時に App Translocation の対象になる。
          # ここでは Developer ID は無いので "-" (ad-hoc) を明示して署名させる。
          xcodebuild \
            -project wm.xcodeproj \
            -scheme wm \
            -configuration Release \
            -destination "platform=macOS" \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            build

      - name: Re-sign ad-hoc (deep) and verify
        run: |
          set -e
          APP_PATH="build/Build/Products/Release/wm.app"
          # 念のため bundle 全体を ad-hoc 再署名し、frameworks も一括で署名する。
          # ad-hoc 署名されていれば quarantine 付きでも translocation されない。
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -dv --verbose=4 "$APP_PATH" 2>&1 | head -20

      - name: Package .app
        id: package
        run: |
          set -e
          APP_PATH="build/Build/Products/Release/wm.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Release build の .app が見つかりません: $APP_PATH"
            ls -R build/Build/Products || true
            exit 1
          fi
          SHORT_SHA=$(git rev-parse --short HEAD)
          ZIP_NAME="wm-${SHORT_SHA}.zip"
          # ditto は .app バンドルのメタデータと拡張属性を保ったまま zip 化できる
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_NAME"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          ls -la "$ZIP_NAME"

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: wm-${{ steps.package.outputs.short_sha }}
          path: ${{ steps.package.outputs.zip_name }}
          if-no-files-found: error
          retention-days: 14
